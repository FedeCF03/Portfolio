name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Publish Blazor Project
      run: dotnet publish src/FedePortfolio.Web/FedePortfolio.Web.csproj -c Release -o release

    # PASO DE DIAGNÓSTICO: Nos muestra en la consola de GitHub exactamente dónde quedó el index.html
    - name: List output files
      run: find release/ -name "index.html"

    # CORREGIDO: Buscamos el index.html dinámicamente en la salida de release para que sed no falle
    - name: Change base-href
      run: |
        INDEX_PATH=$(find release/ -name "index.html" | head -n 1)
        if [ -f "$INDEX_PATH" ]; then
          sed -i 's/<base href="\/" \/>/<base href="\/Portfolio\/" \/>/g' "$INDEX_PATH"
          # Duplicamos el archivo encontrado como 404.html en su misma carpeta
          cp "$INDEX_PATH" "$(dirname "$INDEX_PATH")/404.html"
          # Agregamos el archivo .nojekyll en la raíz de wwwroot detectada
          touch "$(dirname "$INDEX_PATH")/.nojekyll"
        else
          echo "ERROR: No se encontró index.html en la carpeta de release" && exit 1
        fi

    # CORREGIDO: Buscamos dinámicamente la carpeta wwwroot real para subirla a gh-pages
    - name: Commit and Push to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: release/wwwroot
        branch: gh-pages
