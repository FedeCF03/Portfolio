name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Publish Blazor Project
      run: dotnet publish src/FedePortfolio.Web/FedePortfolio.Web.csproj -c Release -o release

    # PASO DE DIAGNÓSTICO MAESTRO: Muestra en la consola de GitHub Actions el árbol completo de archivos generados
    - name: Inspect Publish Directory Structure
      run: |
        echo "=== ESTRUCTURA COMPLETA DE LA CARPETA RELEASE ==="
        find release/
        echo "================================================="

    # Modificación flexible: Solo aplica el fix de URL si realmente existe un index.html estático
    - name: Configure Static Routing (If HTML App)
      run: |
        INDEX_PATH=$(find release/ -name "index.html" | head -n 1)
        if [ -f "$INDEX_PATH" ]; then
          echo "Aplicando parche a la aplicación estática en: $INDEX_PATH"
          sed -i 's/<base href="\/" \/>/<base href="\/Portfolio\/" \/>/g' "$INDEX_PATH"
          cp "$INDEX_PATH" "$(dirname "$INDEX_PATH")/404.html"
          touch "$(dirname "$INDEX_PATH")/.nojekyll"
        else
          echo "AVISO: No se detectó index.html. El proyecto podría estar configurado como Blazor Server/Interactive WebApp."
          echo "Creando un archivo de contingencia .nojekyll en la raíz para habilitar assets dinámicos."
          touch release/wwwroot/.nojekyll || touch release/.nojekyll
        fi

    # Sube la carpeta raíz resultante para ver qué impacto tiene en Pages
    - name: Commit and Push to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: release/wwwroot
        branch: gh-pages
